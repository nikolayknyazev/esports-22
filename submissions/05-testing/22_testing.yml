      type: http
      seq: 2
    http:
      method: GET
      url: '{{baseUrl}}/api/Advertisements/probabilities'
      auth: inherit
    runtime:
      scripts:
        - type: tests
          code: |-
            test("Статус-код должен быть 200", () => {
              expect(res.getStatus()).to.equal(200);
            });

            test("Ответ в формате JSON", () => {
              const header = res.getHeader("content-type");
              expect(header).to.include("application/json");
            });

            test("Все компании содержат ожидаемые поля", () => {
              const body = res.getBody();

              body.forEach(item => {    
                expect(item).to.have.property("key");
                expect(item).to.have.property("value");
              })
            });
      assertions:
        - expression: res.status
          operator: eq
          value: '200'
        - expression: res.body
          operator: length
          value: '2'
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
